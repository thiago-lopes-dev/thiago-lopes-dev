name: Update Real Streak

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  streak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Calculate streak
        run: |
          sudo apt-get install -y jq

          DATA=$(curl -s https://github-contributions-api.jogruber.de/v4/thiago-lopes-dev)

          STREAK=$(echo $DATA | jq '.currentStreak')

          echo "STREAK=$STREAK" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/streak_days=[0-9]*/streak_days=$STREAK/" README.md

      - name: Commit
        run: |
          git config --global user.name "streak-bot"
          git config --global user.email "streak-bot@users.noreply.github.com"
          git add README.md
          git commit -m "Update streak" || echo "Nothing to commit"
          git push https://$GH_PAT@github.com/thiago-lopes-dev/thiago-lopes-dev.git HEAD:main
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
